<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Prank</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  background:#000;
  overflow:hidden;
  font-family:"Courier New", monospace;
  color:#00ff41;
}

/* START */
#start{
  position:fixed;
  inset:0;
  background:#020402;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:99;
}

#start button{
  background:#000;
  color:#00ff41;
  border:2px solid #00ff41;
  padding:22px 30px;
  font-size:18px;
  border-radius:14px;
  box-shadow:0 0 28px #00ff41;
}

/* TERMINAL */
#terminal{
  display:none;
  position:fixed;
  inset:0;
  padding:16px;
  background:#010501;
}

.termBox{
  border:2px solid #00ff41;
  height:100%;
  padding:14px;
  box-shadow:0 0 24px #00ff41;
  background:rgba(0,20,0,.78);
}

.termTitle{
  font-size:15px;
  margin-bottom:10px;
}

.line{
  opacity:0;
  font-size:13px;
  margin:7px 0;
  animation:show .25s forwards;
}

@keyframes show{to{opacity:1}}

.barBox{
  margin-top:18px;
  border:1px solid #00ff41;
  height:18px;
}

.bar{
  height:100%;
  width:0;
  background:#00ff41;
  animation:load 9s linear forwards;
}

@keyframes load{to{width:100%}}

/* FINAL STAR WARS */
#final{
  display:none;
  position:fixed;
  inset:0;
  overflow:hidden;
  background:#000;
  color:#ffd700;
}

.stars{
  position:absolute;
  inset:0;
  background-image:
    radial-gradient(#fff 1px, transparent 1px),
    radial-gradient(#aaa 1px, transparent 1px);
  background-size:32px 32px, 70px 70px;
  animation:stars 14s linear infinite;
}

@keyframes stars{
  to{background-position:0 1000px, 0 1400px}
}

.crawlWrap{
  position:absolute;
  bottom:-220px;
  width:100%;
  height:100%;
  perspective:420px;
  overflow:hidden;
}

.crawl{
  width:92%;
  margin:auto;
  text-align:center;
  font-weight:900;
  color:#ffd700;
  text-shadow:0 0 14px #ffd700;
  transform-origin:50% 100%;
  animation:crawl 16s linear forwards;
}

.crawl h2{
  font-size:30px;
  margin-bottom:28px;
}

.crawl p{
  font-size:22px;
  line-height:1.65;
}

.big{
  font-size:34px;
  display:block;
  margin-top:18px;
}

.bj{
  font-size:54px;
  margin-top:24px;
}

@keyframes crawl{
  0%{
    transform:rotateX(28deg) translateY(520px) scale(1.35);
    opacity:1;
  }
  100%{
    transform:rotateX(28deg) translateY(-850px) scale(.55);
    opacity:1;
  }
}
</style>
</head>

<body>

<div id="start">
  <button onclick="start()">CLICA PARA ACEDER 🔐</button>
</div>

<section id="terminal">
  <div class="termBox">
    <div class="termTitle">BANCO CENTRAL DOS TUGAS — SISTEMA LEGACY 1998</div>
    <div id="lines"></div>
    <div class="barBox"><div class="bar"></div></div>
  </div>
</section>

<section id="final">
  <div class="stars"></div>

  <div class="crawlWrap">
    <div class="crawl">
      <h2>PLOT TWIST:<br>NÃO ACEDI A NADA 😇</h2>

      <p>
        Só queria ver se tinhas nível…<br>
        e falhaste 😂<br><br>

        Nem todos têm o meu nível 👑<br><br>

        Isto aqui?<br>
        Fiz em 5 minutos…<br><br>

        Imagina o que faço<br>
        em 24 horas ⏳🔥<br><br>

        <span class="big">EM BREVE:</span>
        O curso de como ser<br>
        <span class="big">JOSÉ PIMENTA 🚀</span>
      </p>

      <div class="bj">BJSSS 💋</div>
    </div>
  </div>
</section>

<script>
let audioCtx;

function beep(f=400,d=70,t="square",v=.04){
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  o.type=t;
  o.frequency.value=f;
  g.gain.value=v;
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime+d/1000);
}

function typing(){
  return setInterval(()=>{
    beep(250+Math.random()*650,45,"square",.035);
  },75);
}

function start(){
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();

  document.getElementById("start").style.display="none";
  document.getElementById("terminal").style.display="block";

  const ts=typing();

  const arr=[
    "> A ESTABELECER LIGAÇÃO SEGURA................[ OK ]",
    "> A AUTENTICAR UTILIZADOR.....................[ OK ]",
    "> A ACEDER AO SISTEMA BANCÁRIO................[ OK ]",
    "> A CONSULTAR SALDO DISPONÍVEL................[ OK ]",
    "> A DESBLOQUEAR COFRE DIGITAL.................[ OK ]",
    "> A INICIAR TRANSFERÊNCIA.....................[ OK ]",
    "> VALOR: INFINITO €...........................[ OK ]",
    "> TRANSFERÊNCIA DE CARISMA E DOMÍNIO..........[ OK ]",
    "> SISTEMA TERMINADO. A CARREGAR SURPRESA..."
  ];

  arr.forEach((x,i)=>{
    setTimeout(()=>{
      let d=document.createElement("div");
      d.className="line";
      d.textContent=x;
      document.getElementById("lines").appendChild(d);
    },i*850);
  });

  setTimeout(()=>{
    clearInterval(ts);
    document.getElementById("terminal").style.display="none";
    document.getElementById("final").style.display="block";
  },9300);
}
</script>

</body>
</html>
