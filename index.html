<style>
*{box-sizing:border-box}
body{margin:0;background:#000;font-family:"Courier New",monospace;overflow:hidden;color:#00ff41}
#start{position:fixed;inset:0;background:#020402;display:flex;align-items:center;justify-content:center;z-index:99}
#start button{background:#000;color:#00ff41;border:2px solid #00ff41;padding:20px 28px;font-size:18px;border-radius:14px;box-shadow:0 0 25px #00ff41}

#terminal{display:none;position:fixed;inset:0;padding:16px;background:#010501}
.termBox{border:2px solid #00ff41;height:100%;padding:14px;box-shadow:0 0 24px #00ff41;background:rgba(0,20,0,.75)}
.termTitle{font-size:15px;margin-bottom:10px}
.line{opacity:0;font-size:13px;margin:7px 0;animation:show .25s forwards}
@keyframes show{to{opacity:1}}
.barBox{margin-top:18px;border:1px solid #00ff41;height:18px}
.bar{height:100%;width:0;background:#00ff41;animation:load 9s linear forwards}
@keyframes load{to{width:100%}}

#final{display:none;position:fixed;inset:0;overflow:hidden;background:linear-gradient(180deg,#050015,#16002e 45%,#020008)}
.stars{position:absolute;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px),radial-gradient(#ff7be9 1px,transparent 1px);background-size:35px 35px,70px 70px;animation:stars 5s linear infinite}
@keyframes stars{to{background-position:35px 35px,70px 70px}}
.rainbow{position:absolute;top:20%;left:-20%;width:140%;height:260px;border-radius:50%;border-top:24px solid #ff0055;box-shadow:0 -32px 0 #ff9300,0 -64px 0 #ffee00,0 -96px 0 #00ff66,0 -128px 0 #00ccff,0 -160px 0 #9b5cff;opacity:.75}
.grid{position:absolute;bottom:0;width:100%;height:45%;background:linear-gradient(#ff2bd650 1px,transparent 1px),linear-gradient(90deg,#ff2bd650 1px,transparent 1px);background-size:40px 40px;transform:perspective(300px) rotateX(55deg);transform-origin:bottom;box-shadow:0 0 35px #ff2bd6}

.soundBox{position:absolute;top:12px;left:12px;border:2px solid #00ff41;color:#00ff41;padding:10px;border-radius:10px;box-shadow:0 0 14px #00ff41;font-size:12px}
.musicBox{position:absolute;top:12px;right:12px;border:2px solid #ff4fd8;color:#ff4fd8;padding:10px;border-radius:10px;box-shadow:0 0 14px #ff4fd8;font-size:12px}

.bear{position:absolute;font-size:58px;z-index:4;animation:bounce 2s infinite}

@keyframes bounce{50%{transform:translateY(-16px)}}
